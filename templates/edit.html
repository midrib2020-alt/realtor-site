<!DOCTYPE html>
<html>
<head>
    <title>Edit Item</title>
</head>
<body style="font-family:Arial;padding:40px;">

<h2>Edit {{ item_type|capitalize }}</h2>

<form method="POST">

    <label>Title</label><br>
    <input type="text" name="title" value="{{ item.title }}" required><br><br>

    <label>Location</label><br>
    <input type="text" name="location" value="{{ item.location }}" required><br><br>

    <label>Price</label><br>
    <input type="text" name="price" value="{{ item.price }}" required><br><br>

    <button type="submit">Update</button>

</form>

<br>
<a href="{{ url_for('admin') }}">⬅ Back to Dashboard</a>

</body>
</html>
